# Сборка в облаке при push/PR (не зависит от выключенного ноутбука).
name: Android CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  assemble-stable-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble stableDebug
        run: ./gradlew :app:assembleStableDebug --no-daemon

      - name: Unit tests (stableDebug)
        run: ./gradlew :app:testStableDebugUnitTest --no-daemon

      - name: Assemble stableRelease (R8 / подпись как у debug, если нет keystore)
        run: ./gradlew :app:assembleStableRelease --no-daemon

      - name: Lint (stableDebug)
        run: ./gradlew :app:lintStableDebug --no-daemon -Pforpda.strictLint=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForPDA-stableDebug
          path: app/build/outputs/apk/stable/debug/*.apk
