<!doctype html>
<html>
<head>
    <title>${details_title}</title>
    <script type="text/javascript" src="file:///android_asset/forpda/scripts/main.js"></script>
    <script type="text/javascript" src="file:///android_asset/forpda/scripts/modules/news.js"></script>
    <!--<script type="text/javascript" src="file:///android_asset/forpda/scripts/blocks.js"></script>-->
    <link rel="stylesheet" type="text/css" href="file:///android_asset/forpda/styles/md_colors.css">
    <link rel="stylesheet" type="text/css" href="file:///android_asset/fonts/roboto/import_mono.css">
    <link rel="stylesheet" type="text/css" href="file:///android_asset/fonts/fontello/import.css">
    <link rel="stylesheet" type="text/css" href="file:///android_asset/forpda/styles/${style_type}/${style_type}_main.css">
    <link rel="stylesheet" type="text/css" href="file:///android_asset/forpda/styles/${style_type}/${style_type}_news.css">
    ${theme_overrides_css}
    <script defer type="text/javascript" src="file:///android_asset/forpda/scripts/z_emoticons.js"></script>
</head>

<body id="news" data-fpda-theme-key="${theme_cache_key}">
${details_header}
<div class="content">
    ${details_content}
</div>
<div class="materials">
    <div class="materials_list">
    <!-- $BeginBlock material -->
        <a class="material_item" href="https://4pda.to/index.php?p=${material_id}">
            <span class="image" style="background-image: url(${material_image})"></span>
            <span class="title">${material_title}</span>
        </a>
    <!-- $EndBlock material -->
    </div>
</div>
    ${details_comments_footer}

<script type="text/javascript">
        function setPaddingBottom(newPadding) {
            var px = Math.max(0, Number(newPadding) || 0);
            document.documentElement.style.setProperty("--news-bottom-chrome-padding", px + "px");
        }
    </script>

<script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof jsEmoticons !== 'undefined' && jsEmoticons.parseAll) {
                jsEmoticons.parseAll("file:///android_asset/smiles/");
            }
        }, { once: true });
    </script>
</body>
</html>
