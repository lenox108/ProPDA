<!doctype html>
<html>

<head>
    <title>${topic_title}</title>
     <script type="text/javascript">
        var PageInfo = {
            bodyType: "${body_type}",

            enableAvatars: ${enable_avatars_bool},
            avatarType: "${avatar_type}",

            allPagesCount: ${all_pages_int},
            postsOnPageCount: ${posts_on_page_int},
            currentPage: ${current_page_int},

            authorized: ${authorized_bool},
            memberId: ${member_id_int}
        }
        function setPaddingBottom(newPadding){
            document.getElementById("padding_for_message_panel").style.paddingBottom = Number(newPadding)+"px";
        }

    </script>
    <script type="text/javascript" src="file:///android_asset/forpda/scripts/main.js"></script>
    <script type="text/javascript" src="file:///android_asset/forpda/scripts/modules/search.js"></script>
    <script type="text/javascript" src="file:///android_asset/forpda/scripts/modules/posts_functions.js"></script>
    <script type="text/javascript" src="file:///android_asset/forpda/scripts/attach_transformer.js"></script>
    <script type="text/javascript" src="file:///android_asset/forpda/scripts/blocks.js"></script>
    <link rel="stylesheet" type="text/css" href="file:///android_asset/forpda/styles/md_colors.css">
    <link rel="stylesheet" type="text/css" href="file:///android_asset/fonts/roboto/import_mono.css">
    <link rel="stylesheet" type="text/css" href="file:///android_asset/fonts/fontello/import.css">
    <link rel="stylesheet" type="text/css" href="file:///android_asset/forpda/styles/${style_type}/${style_type}_main.css">
    <link rel="stylesheet" type="text/css" href="file:///android_asset/forpda/styles/${style_type}/${style_type}_themes.css">
    ${theme_overrides_css}
    <script type="text/javascript" src="file:///android_asset/forpda/scripts/z_emoticons.js"></script>
</head>

<body id="${body_type}" class="${enable_avatars} ${avatar_type}">
    <div class="posts_list">
        <!-- $BeginBlock post -->
        <div name="entry${post_id}" class="post_container ${user_online} ${post_content_state_class}" data-post-id="${post_id}" data-user-id="${user_id}" data-nick="${nick}" data-open-url="${post_open_url}">
            <div class="post_title"><a href="${post_title_href}">${post_title}</a></div>
            <div class="post_header">
                <div tabindex="-1" class="accessibility_anchor"></div>
                <div class="header_wrapper">
                    <div class="avatar ${none_avatar} aec">
                        <b class="letter" onclick="IThemePresenter.showUserMenu('${post_id}')">${nick_letter}</b>
                        <div class="img" style="background-image:url(${avatar});" onclick="IThemePresenter.showUserMenu('${post_id}')" role="button" aria-label="${res_s_avatar}"></div>
                        <div class="reputation" onclick="IThemePresenter.showReputationMenu('${post_id}')" role="button" aria-label="${res_s_reputation} ${reputation}"><span>${reputation}</span></div>
                    </div>
                    <span class="inf nick">
                        <span class="aec" onclick="IThemePresenter.showUserMenu('${post_id}')"><b>${nick}</b></span>
                        <span class="online_dot" aria-hidden="true"></span>
                    </span>
                    <span class="inf post_meta">
                        <span class="group_text aec" style="color:${group_color};" onclick="IThemePresenter.toast('${res_s_group}: ${group}')" role="button" aria-label="${res_s_group} ${group}"><span>${group}</span></span>
                        <span class="date"><span>${date}</span></span>
                    </span>
                    <a class="btn inf menu aec" onclick="IThemePresenter.showPostMenu('${post_id}')" role="button" aria-label="${res_s_menu}"><span>${res_s_menu}</span></a>
                </div>
            </div>
            <a class="btn hat_button aec" onclick="toggleButton(this, 'hat_content', 'search')" role="button" aria-label="${res_s_hat}" aria-expanded="${post_content_expanded_bool}"><span>Содержимое поста</span><i class="icon"></i></a>
            <div class="hat_content ${post_content_state_class}">
                <div class="post_body emoticons">${body}</div>
            </div>
            <div class="search_jump_to_post" style="${search_jump_row_style}">
                <span class="search_post_id_hint">id ${post_id}</span>
                <a class="search_post_btn" href="${jump_to_post_url}" role="button" aria-label="пост"><i class="icon icon-right-dir-1"></i></a>
            </div>
        </div>
        <!-- $EndBlock post -->
    </div>
    <!--<div id="padding_for_message_panel" style="padding-bottom: 4em;"></div>-->
    <script type="text/javascript">
        jsEmoticons.parseAll("file:///android_asset/smiles/")

    </script>
</body>

</html>
